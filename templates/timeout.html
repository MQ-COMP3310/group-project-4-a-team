{% extends 'base.html' %} {% block content %}
<div class="container base-content">
    <div class="row justify-content-center">
        <div class="col text-center">
            <h1>Session Expired!</h1>
            <p>You have timed out due to inactivity. Please start again.</p>
            <form method="POST">
                <input type="hidden" name="restart" value="start_again">
                <button class="btn btn-dark hvr-round-corners">Restart</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
